          example:
            theme: dark
            language: en
        createdAt:
          $ref: '#/components/schemas/DateTime'
        updatedAt:
          $ref: '#/components/schemas/DateTime'
        links:
          type: array
          items:
            $ref: '#/components/schemas/Link'

name: E2E JWT Matrix

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  e2e-jwt:
    name: E2E (${{ matrix.jwt.id }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        jwt:
          - id: hs256
            algorithm: HS256
          - id: hs384
            algorithm: HS384
          - id: hs512
            algorithm: HS512
          - id: rs256
            algorithm: RS256
          - id: rs384
            algorithm: RS384
          - id: rs512
            algorithm: RS512
          - id: es256
            algorithm: ES256
          - id: es384
            algorithm: ES384
          - id: es512
            algorithm: ES512
    env:
      BASE_URL: http://localhost:8080/v1
      COMPOSE_FILE: docker-compose.yml:docker-compose.e2e.override.yml
      COMPOSE_PROJECT_NAME: e2e-${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.jwt.id }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install requests

      - name: Generate fresh JWT key material
        env:
          JWT_ALGORITHM: ${{ matrix.jwt.algorithm }}
        run: |
          set -euo pipefail
          mkdir -p secrets

          case "$JWT_ALGORITHM" in
            HS256|HS384|HS512)
              openssl rand -hex 64 > secrets/jwt_secret.txt
              ;;
            RS256|RS384|RS512)
              openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:2048 -out secrets/jwt_private.pem
              openssl pkey -in secrets/jwt_private.pem -pubout -out secrets/jwt_public.pem
              ;;
            ES256)
              openssl genpkey -algorithm EC -pkeyopt ec_paramgen_curve:P-256 -out secrets/jwt_private.pem
              openssl pkey -in secrets/jwt_private.pem -pubout -out secrets/jwt_public.pem
              ;;
            ES384)
              openssl genpkey -algorithm EC -pkeyopt ec_paramgen_curve:P-384 -out secrets/jwt_private.pem
              openssl pkey -in secrets/jwt_private.pem -pubout -out secrets/jwt_public.pem
              ;;
            ES512)
              openssl genpkey -algorithm EC -pkeyopt ec_paramgen_curve:P-521 -out secrets/jwt_private.pem
              openssl pkey -in secrets/jwt_private.pem -pubout -out secrets/jwt_public.pem
              ;;
            *)
              echo "Unsupported JWT algorithm: $JWT_ALGORITHM" >&2
              exit 1
              ;;
          esac

      - name: Create compose override for JWT algorithm
        env:
          JWT_ALGORITHM: ${{ matrix.jwt.algorithm }}
        run: |
          set -euo pipefail

          case "$JWT_ALGORITHM" in
            HS256|HS384|HS512)
              cat > docker-compose.e2e.override.yml <<YAML
          services:
            app:
              environment:
                JWT_ALGORITHM: ${JWT_ALGORITHM}
                JWT_SECRET_FILE: /run/secrets/jwt_secret.txt
          YAML
              ;;
            RS256|RS384|RS512)
              cat > docker-compose.e2e.override.yml <<YAML
          services:
            app:
              environment:
                JWT_ALGORITHM: ${JWT_ALGORITHM}
                JWT_PRIVATE_KEY_FILE: /run/secrets/jwt_private.pem
                JWT_PUBLIC_KEY_FILE: /run/secrets/jwt_public.pem
          YAML
              ;;
            ES256|ES384|ES512)
              cat > docker-compose.e2e.override.yml <<YAML
          services:
            app:
              environment:
                JWT_ALGORITHM: ${JWT_ALGORITHM}
                JWT_PRIVATE_KEY_FILE: /run/secrets/jwt_private.pem
                JWT_PUBLIC_KEY_FILE: /run/secrets/jwt_public.pem
          YAML
              ;;
            *)
              echo "Unsupported JWT algorithm: $JWT_ALGORITHM" >&2
              exit 1
              ;;
          esac

      - name: Build app
        run: docker compose build app

      - name: Start services
        run: docker compose up -d

      - name: Run e2e tests
        run: python tests/e2e.py

      - name: Dump app logs on failure
        if: failure()
        run: docker compose logs --no-color app

      - name: Cleanup
        if: always()
        run: docker compose down -v --remove-orphans

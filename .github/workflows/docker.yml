name: Build and Deploy

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  test-e2e:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run unit tests with coverage
        run: |
          set -euo pipefail

          go test -coverprofile=unit_coverage.out ./...

          UNIT_COVERAGE=$(go tool cover -func=unit_coverage.out | awk '/^total:/ { gsub("%", "", $NF); print $NF }')
          if [ -z "$UNIT_COVERAGE" ]; then
            echo "ERROR: failed to extract unit coverage"
            exit 1
          fi

          echo "UNIT_COVERAGE=$UNIT_COVERAGE" >> "$GITHUB_ENV"
          echo "Unit coverage: ${UNIT_COVERAGE}%"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install requests

      - name: Create jwt secret
        run: echo "test-jwt-secret-key-for-ci" > secrets/jwt_secret

      - name: Build app
        run: docker compose build app

      - name: Start services
        run: docker compose up -d

      - name: Wait for app
        run: sleep 10

      - name: Run e2e tests
        env:
          BASE_URL: http://localhost:8080/v1
        run: python tests/e2e.py

      - name: Generate coverage badge
        env:
          UNIT_COVERAGE: ${{ env.UNIT_COVERAGE }}
        run: python tests/generate_coverage_badge.py

      - name: Upload coverage badge artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-badge
          path: coverage_badge.svg
          retention-days: 7

      - name: Cleanup
        if: always()
        run: docker compose down

  publish-coverage-badge:
    needs: test-e2e
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download coverage badge artifact
        uses: actions/download-artifact@v8
        with:
          name: coverage-badge
          path: /tmp/coverage-badge

      - name: Publish badge to gh-pages
        run: |
          set -euo pipefail

          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          if git ls-remote --exit-code --heads origin gh-pages; then
            git checkout gh-pages
            git pull --ff-only origin gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf . >/dev/null 2>&1 || true
          fi

          cp /tmp/coverage-badge/coverage_badge.svg coverage_badge.svg

          cat > index.html << 'HTML'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8" />
            <title>API Coverage</title>
            <style>
              body { font-family: Arial, sans-serif; padding: 40px; }
              .badge { display: inline-block; margin: 20px 0; }
            </style>
          </head>
          <body>
            <h1>API Coverage Badge</h1>
            <p>Coverage from e2e and unit tests:</p>
            <div class="badge">
              <img src="coverage_badge.svg" alt="Coverage" />
            </div>
          </body>
          </html>
          HTML

          git add coverage_badge.svg index.html

          if git diff --cached --quiet; then
            echo "No changes to publish"
            exit 0
          fi

          git commit -m "Update coverage badge"
          git push origin gh-pages

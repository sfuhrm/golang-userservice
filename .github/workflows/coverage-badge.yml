name: Deploy Coverage Badge

on:
  workflow_run:
    workflows: ["Build and Deploy"]
    types: [completed]
    branches: [master]

jobs:
  deploy-badge:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download coverage badge
        uses: actions/download-artifact@v4
        with:
          name: coverage-badge

      - name: Generate badge HTML
        run: |
          cat > index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <title>API Coverage</title>
            <style>
              body { font-family: Arial, sans-serif; padding: 40px; }
              .badge { display: inline-block; margin: 20px 0; }
            </style>
          </head>
          <body>
            <h1>API Coverage Badge</h1>
            <p>Coverage from e2e tests:</p>
            <div class="badge">
              <img src="coverage_badge.svg" alt="Coverage" />
            </div>
          </body>
          </html>
          EOF

      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0
        if: github.event_name != 'pull_request'

      - name: Create gh-pages branch if needed
        run: |
          if ! git rev-parse --verify gh-pages 2>/dev/null; then
            git checkout --orphan gh-pages
            git rm -rf .
            git commit --allow-empty -m "Initial gh-pages branch"
            git push origin gh-pages
            git checkout master
          fi
        if: github.event_name != 'pull_request'

      - name: Update coverage badge
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          
          git checkout gh-pages
          
          cp ../coverage-badge/coverage_badge.svg . 2>/dev/null || true
          cp index.html index.html
          
          if [ -f coverage_badge.svg ]; then
            git add coverage_badge.svg index.html
            git commit -m "Update coverage badge $(date)"
            git push origin gh-pages
          fi
        if: github.event_name != 'pull_request'
